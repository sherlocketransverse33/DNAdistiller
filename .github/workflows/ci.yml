name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      # First, and deliberately so. This checks the thing every other step
      # assumes: that what is committed is a package that can import itself.
      #
      # It is here because it was not, and nobody noticed. A .gitignore rule
      # meant to block generated profiles (`profile.*`) also matched
      # src/dnadistiller/profile.py, so the first published commit shipped a
      # package where `--help` raised ModuleNotFoundError. The test suite ran
      # green locally the whole time, because locally the file was on disk.
      #
      # Tests cannot catch this. They only ever see the working tree.
      - name: Package imports from a clean checkout
        run: |
          uv run dnadistiller --version
          uv run python -c "import dnadistiller.profile, dnadistiller.cli, dnadistiller.catalog"

      - name: Lint
        run: uv run ruff check src tests

      - name: Format
        run: uv run ruff format --check src tests

      - name: Types
        run: uv run mypy

      - name: Test
        run: uv run pytest --cov=dnadistiller --cov-report=term-missing

  catalog:
    name: Catalog integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras

      # The catalog is data contributed by pull request, so it is validated as
      # input rather than trusted. A typo'd rsID is invisible at runtime: it
      # silently reports "not tested" for every user, forever.
      - name: Validate every marker
        run: uv run python -m dnadistiller.catalog.validate

  no-network:
    name: No network code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The project's central claim is that your genome cannot leave your machine
      # because there is no code that could send it. That claim is worth exactly
      # as much as its enforcement, so it is enforced here rather than in review,
      # where it would survive until the first distracted afternoon.
      - name: Reject network imports in the package
        run: |
          set -euo pipefail
          if grep -rnE '^\s*(import|from)\s+(socket|http|urllib|requests|httpx|aiohttp|ftplib|smtplib|telnetlib|xmlrpc|asyncio)\b' src/dnadistiller/; then
            echo
            echo "A network-capable import was added to src/dnadistiller/."
            echo "dnadistiller promises that no code can transmit your genome. See SECURITY.md."
            exit 1
          fi
          echo "No network imports found."

      - name: Reject network-capable runtime dependencies
        run: |
          set -euo pipefail
          if grep -nE '^\s*"(requests|httpx|aiohttp|urllib3|boto3|google-|azure-)' pyproject.toml; then
            echo
            echo "A network-capable runtime dependency was added."
            exit 1
          fi
          echo "No network dependencies found."
